name: ai-proxy

x-postgres-common: &postgres-common
  image: postgres:16-alpine
  environment:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: ai_proxy
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres"]
    interval: 5s
    timeout: 3s
    retries: 5

services:
  # ─── PostgreSQL ──────────────────────────────────────────
  postgres:
    <<: *postgres-common
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./internal/database/migrations:/docker-entrypoint-initdb.d:ro

  # ─── API Server (hot-reload) ─────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${API_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      ENV: "${ENV:-development}"
      SERVER_PORT: 8080
      DATABASE_URL: "${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/ai_proxy?sslmode=disable}"
      JWT_SECRET: "${JWT_SECRET:-dev-jwt-secret-change-in-prod}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-dev-encryption-key-32-bytes-long!!}"
      LOG_LEVEL: "${LOG_LEVEL:-debug}"
      LOG_FORMAT: "${LOG_FORMAT:-text}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8081,http://0.0.0.0:8081}"
      RATE_LIMIT_REQUESTS_PER_MIN: "${RATE_LIMIT_REQUESTS_PER_MIN:-120}"
      RATE_LIMIT_BURST: "${RATE_LIMIT_BURST:-20}"
    volumes:
      - .:/app
      - /app/tmp
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Admin Server (hot-reload) ───────────────────────────
  admin:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["go", "run", "./cmd/admin"]
    ports:
      - "${ADMIN_PORT:-8081}:8081"
    env_file:
      - .env
    environment:
      ENV: "${ENV:-development}"
      SERVER_PORT: 8081
      DATABASE_URL: "${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/ai_proxy?sslmode=disable}"
      JWT_SECRET: "${JWT_SECRET:-dev-jwt-secret-change-in-prod}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-dev-encryption-key-32-bytes-long!!}"
      LOG_LEVEL: "${LOG_LEVEL:-debug}"
      LOG_FORMAT: "${LOG_FORMAT:-text}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8081,http://0.0.0.0:8081}"
    volumes:
      - .:/app
      - /app/tmp
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
