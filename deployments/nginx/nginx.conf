# =============================================================================
# Nginx Configuration — ai-proxy
#
# Routes:
#   /api/v1/chat/completions  → API server (proxy)
#   /api/v1/admin/*            → Admin server
#   /health                    → API server (can use either)
#   /*                         → Admin server (serves frontend SPA)
# =============================================================================

worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ─── Basic Settings ────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ─── MIME Types ────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ───────────────────────────────────────────
    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_response_time":"$upstream_response_time"'
    '}';

    access_log /var/log/nginx/access.log json buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # ─── Rate Limiting Zones ───────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=20r/s;

    # ─── SSL (optional — uncomment for production) ─────────
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 10m;

    # ─── Security Headers ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Gzip ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ─── Upstream Servers ──────────────────────────────────
    upstream api_backend {
        server api:8080 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    upstream admin_backend {
        server admin:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # ─── Main Server Block ─────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # ─── Redirect to HTTPS (uncomment for production) ──
        # return 301 https://$host$request_uri;

        # ─── Health Check ──────────────────────────────────
        location /health {
            proxy_pass http://api_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # ─── API Proxy (chat completions) ──────────────────
        location /api/v1/chat/completions {
            limit_req zone=api burst=200 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;

            # Buffering disabled for streaming support
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # Headers
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Large body for prompt context
            client_max_body_size 16m;
            client_body_buffer_size 256k;
        }

        # ─── Admin API ─────────────────────────────────────
        location /api/v1/admin/ {
            limit_req zone=admin burst=40 nodelay;

            proxy_pass http://admin_backend/api/v1/admin/;
            proxy_http_version 1.1;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            client_max_body_size 4m;
        }

        # ─── Admin WebSocket ───────────────────────────────
        location /api/v1/admin/ws/ {
            proxy_pass http://admin_backend/api/v1/admin/ws/;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ─── Admin Frontend (SPA) ──────────────────────────
        location / {
            proxy_pass http://admin_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
    }
}
